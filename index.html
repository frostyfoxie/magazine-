<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal 3-Part HTML5 Magazine</title>
    
    <!-- Dependencies (jQuery, Turn.js, and PDF.js) -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        body {
            background: radial-gradient(circle, #444446 0%, #1c1c1e 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        /* Top Controls Dashboard */
        #toolbar {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .btn {
            background: #ffffff;
            color: #1c1c1e;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #e5e5ea;
            transform: scale(1.05);
        }

        /* Loading Overlay screen */
        #loading {
            color: white;
            font-size: 1.2rem;
            position: absolute;
            z-index: 10;
        }

        /* Zoom Scaler Container */
        #viewport {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
            transform: scale(1);
        }

        /* Main Flipbook Viewport Container */
        #flipbook-container {
            width: 1000px;
            height: 650px;
            visibility: hidden;
            position: relative;
        }

        #flipbook {
            width: 100%;
            height: 100%;
        }

        /* Canvas rendering element styles */
        .page-canvas {
            background-color: white;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 3D Realism: Ambient Magazine Crease & Gloss Overlays */
        .magazine-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Passes touches through down to Turn.js mouse-drags */
            z-index: 5;
        }

        /* Double-page configuration depth map */
        .double-mode .magazine-overlay {
            background: 
                linear-gradient(to right, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 4%, rgba(255,255,255,0.08) 5%, rgba(255,255,255,0) 12%),
                linear-gradient(to left, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 4%, rgba(255,255,255,0.08) 5%, rgba(255,255,255,0) 12%),
                linear-gradient(to right, rgba(0,0,0,0) 48%, rgba(0,0,0,0.3) 49.5%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.3) 50.5%, rgba(0,0,0,0) 52%);
        }

        /* Single vertical page configuration depth map */
        .single-mode .magazine-overlay {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
        }
    </style>
</head>
<body>

    <!-- Upper Interactive Toolbar -->
    <div id="toolbar">
        <button class="btn" id="prev-btn">◀ Prev</button>
        <button class="btn" id="view-btn">View: Double Page</button>
        <button class="btn" id="zoom-btn">Zoom: 100%</button>
        <button class="btn" id="next-btn">Next ▶</button>
    </div>

    <!-- Active Stream Progress Alert -->
    <div id="loading">Assembling Parts... <span id="progress">0</span>%</div>

    <!-- Magazine Matrix Screen Wrapper -->
    <div id="viewport">
        <div id="flipbook-container" class="double-mode">
            <div id="flipbook"></div>
            <!-- Dynamic 3D depth shadows look layer overlay -->
            <div class="magazine-overlay"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

        // 🟢 List your file paths sequentially here (since they are in the same folder, simple filenames work)
        const pdfParts = ['part1.pdf', 'part2.pdf', 'part3.pdf'];
        
        const flipbook = $('#flipbook');
        const container = $('#flipbook-container');
        const viewport = $('#viewport');
        const loadingDiv = $('#loading');
        const progressText = $('#progress');

        let isZoomed = false;
        let isSinglePage = false;

        async function processMagazineParts() {
            try {
                let currentProcessed = 0;
                const totalParts = pdfParts.length;

                // 1. Loop through all 3 parts in order
                for (let partIdx = 0; partIdx < totalParts; partIdx++) {
                    const pdfUrl = pdfParts[partIdx];
                    const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                    const numPages = pdf.numPages;

                    // 2. Extract pages from inside the current part
                    for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        const pageViewport = page.getViewport({ scale: 2.0 }); // High scale maintains crystal clear text when zoomed
                        
                        const canvas = document.createElement('canvas');
                        canvas.className = 'page-canvas';
                        canvas.height = pageViewport.height;
                        canvas.width = pageViewport.width;

                        const context = canvas.getContext('2d');
                        await page.render({ canvasContext: context, viewport: pageViewport }).promise;

                        // Add page node into DOM structure
                        const pageDiv = document.createElement('div');
                        pageDiv.appendChild(canvas);
                        flipbook.append(pageDiv);
                    }

                    // Update UI assembly status bar
                    currentProcessed++;
                    let percent = Math.round((currentProcessed / totalParts) * 100);
                    progressText.text(percent);
                }

                // 3. Reveal book and spin up interaction frameworks
                loadingDiv.hide();
                container.css('visibility', 'visible');

                // Boot Turn.js Engine (Enables side drag peel corners automatically)
                flipbook.turn({
                    width: 1000,
                    height: 650,
                    autoCenter: true,
                    display: 'double',
                    duration: 900,  
                    acceleration: true,
                    gradients: true, // Internal realistic page transition lighting shifts
                    elevation: 60    // Depth intensity metric of the folding corner action
                });

            } catch (error) {
                loadingDiv.text('Error gathering magazine pieces. Check your file naming alignment.');
                console.error(error);
            }
        }

        // --- BUTTON INTERACTION LOGIC ---

        // Manual Flips
        $('#prev-btn').on('click', () => flipbook.turn('previous'));
        $('#next-btn').on('click', () => flipbook.turn('next'));

        // View Mode Toggle Engine (Double Spread vs Single Page Layouts)
        $('#view-btn').on('click', function() {
            if (isZoomed) resetZoom();
            
            if (!isSinglePage) {
                flipbook.turn('display', 'single');
                container.css({ width: '500px', height: '650px' });
                container.removeClass('double-mode').addClass('single-mode');
                $(this).text('View: Single Page');
                isSinglePage = true;
            } else {
                flipbook.turn('display', 'double');
                container.css({ width: '1000px', height: '650px' });
                container.removeClass('single-mode').addClass('double-mode');
                $(this).text('View: Double Page');
                isSinglePage = false;
            }
            flipbook.turn('resize');
        });

        // Responsive Zoom Transformation Matrix Engine
        $('#zoom-btn').on('click', function() {
            if (!isZoomed) {
                viewport.css('transform', 'scale(1.65)'); // Smoothly scale layout elements without blurring
                $(this).text('Zoom: 165%');
                isZoomed = true;
                document.body.style.overflow = "auto"; // Unlock viewport body panning if required
            } else {
                resetZoom();
            }
        });

        function resetZoom() {
            viewport.css('transform', 'scale(1)');
            $('#zoom-btn').text('Zoom: 100%');
            isZoomed = false;
        }

        // Initialize multi-part workflow
        processMagazineParts();
    </script>
</body>
</html>
