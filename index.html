<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 Magazine Flipbook</title>
    
    <!-- Dependencies (jQuery, Turn.js, and PDF.js) -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        body {
            background: radial-gradient(circle, #444446 0%, #1c1c1e 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        /* Top Control Buttons */
        #toolbar {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .btn {
            background: #ffffff;
            color: #1c1c1e;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #e5e5ea;
            transform: scale(1.05);
        }

        /* Loading Message Screen */
        #loading {
            color: white;
            font-size: 1.2rem;
            position: absolute;
            z-index: 10;
        }

        /* Viewport Container for Smooth Zooming */
        #viewport {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
            transform: scale(1);
        }

        /* Flipbook Box (Locked to strict A4 Ratio) */
        #flipbook-container {
            width: 900px;  /* 450px * 2 for spreads */
            height: 636px; /* A4 aspect ratio height calculation */
            visibility: hidden;
            position: relative;
        }

        #flipbook {
            width: 100%;
            height: 100%;
        }

        /* Individual page styling */
        .page-canvas {
            background-color: white;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 2D Realism Overlay: Crease Shadow & Spine Shine Effect */
        .magazine-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass straight through to pages */
            z-index: 5;
        }

        /* Shadow filters for regular inside pages */
        .double-mode .magazine-overlay {
            background: 
                linear-gradient(to right, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 4%, rgba(255,255,255,0.08) 5%, rgba(255,255,255,0) 12%), /* Left page glow */
                linear-gradient(to left, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 4%, rgba(255,255,255,0.08) 5%, rgba(255,255,255,0) 12%),  /* Right page glow */
                linear-gradient(to right, rgba(0,0,0,0) 48%, rgba(0,0,0,0.3) 49.5%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.3) 50.5%, rgba(0,0,0,0) 52%); /* Center spine fold line */
        }

        /* Ambient filter for front cover, back cover, or single page plain view */
        .single-mode .magazine-overlay {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
        }
    </style>
</head>
<body>

    <!-- Upper Toolbar Menu -->
    <div id="toolbar">
        <button class="btn" id="prev-btn">◀ Prev</button>
        <button class="btn" id="view-btn">View: Double Page</button>
        <button class="btn" id="zoom-btn">Zoom: 100%</button>
        <button class="btn" id="next-btn">Next ▶</button>
    </div>

    <!-- Processing Notification -->
    <div id="loading">Assembling A4 Pages... <span id="progress">0</span>%</div>

    <!-- Main Workspace Container Layout -->
    <div id="viewport">
        <div id="flipbook-container" class="double-mode">
            <div id="flipbook"></div>
            <!-- Interactive ambient paper shine/shadow filter layer -->
            <div class="magazine-overlay"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

        // 🟢 Files are loaded sequentially from the folder automatically
        const pdfParts = ['part1.pdf', 'part2.pdf', 'part3.pdf'];
        
        const flipbook = $('#flipbook');
        const container = $('#flipbook-container');
        const viewport = $('#viewport');
        const loadingDiv = $('#loading');
        const progressText = $('#progress');

        let isZoomed = false;
        let isSinglePage = false;

        async function processMagazineParts() {
            try {
                let currentProcessed = 0;
                const totalParts = pdfParts.length;

                // 1. Loop through all 3 parts in order
                for (let partIdx = 0; partIdx < totalParts; partIdx++) {
                    const pdfUrl = pdfParts[partIdx];
                    const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                    const numPages = pdf.numPages;

                    // 2. Extract pages from inside the current part
                    for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        
                        // High scale rendering gives pristine details when zoomed
                        const pageViewport = page.getViewport({ scale: 2.5 }); 
                        
                        const canvas = document.createElement('canvas');
                        canvas.className = 'page-canvas';
                        canvas.height = pageViewport.height;
                        canvas.width = pageViewport.width;

                        const context = canvas.getContext('2d');
                        await page.render({ canvasContext: context, viewport: pageViewport }).promise;

                        // Append new node block to our flipbook engine structure
                        const pageDiv = document.createElement('div');
                        pageDiv.appendChild(canvas);
                        flipbook.append(pageDiv);
                    }

                    // Update UI assembly status percentage loading details
                    currentProcessed++;
                    let percent = Math.round((currentProcessed / totalParts) * 100);
                    progressText.text(percent);
                }

                // 3. Unhide layouts and engage Turn.js
                loadingDiv.hide();
                container.css('visibility', 'visible');

                // Boot Turn.js Engine
                flipbook.turn({
                    width: 900,       // Full double-page flat sizing width bound
                    height: 636,      // Height constraint
                    autoCenter: true,
                    display: 'double',
                    duration: 900,  
                    acceleration: true,
                    gradients: true,  // Enables native flip transition shade layers
                    elevation: 60     // Peel lift elevation amplitude metric
                });

                // 4. SMART COVER TRACKING ENGINE
                // Forces front cover (page 1) and back cover to load alone cleanly
                flipbook.bind('turning', function(event, page, view) {
                    if (page == 1 || page == flipbook.turn('pages')) {
                        container.removeClass('double-mode').addClass('single-mode');
                    } else if (!isSinglePage) {
                        container.removeClass('single-mode').addClass('double-mode');
                    }
                });

            } catch (error) {
                loadingDiv.text('Error gathering parts. Make sure filenames are correct.');
                console.error(error);
            }
        }

        // --- INTERACTION BUTTON ACTIONS ---

        // Manual Navigation Flips
        $('#prev-btn').on('click', () => flipbook.turn('previous'));
        $('#next-btn').on('click', () => flipbook.turn('next'));

        // View Mode Toggle (Single vertical page plain mode vs double-spreads)
        $('#view-btn').on('click', function() {
            if (isZoomed) resetZoom();
            
            if (!isSinglePage) {
                flipbook.turn('display', 'single');
                container.css({ width: '450px', height: '636px' });
                container.removeClass('double-mode').addClass('single-mode');
                $(this).text('View: Single Page');
                isSinglePage = true;
            } else {
                flipbook.turn('display', 'double');
                container.css({ width: '900px', height: '636px' });
                
                // Restore mid fold line shadow only if we are not sitting on a cover page
                let currentPage = flipbook.turn('page');
                if (currentPage !== 1 && currentPage !== flipbook.turn('pages')) {
                    container.removeClass('single-mode').addClass('double-mode');
                }
                
                $(this).text('View: Double Page');
                isSinglePage = false;
            }
            flipbook.turn('resize');
            });
        // Matrix Zoom Scaling engine
        
        $('#zoom-btn').on('click', function() {if (!isZoomed) {viewport.css('transform', 'scale(1.65)'); // Magnifies layout assets perfectly$(this).text('Zoom: 165%');isZoomed = true;document.body.style.overflow = "auto"; 
                                                               
                                                               // Unlock outer canvas scrolling bounds} else {resetZoom();}});

        function resetZoom() {viewport.css('transform', 'scale(1)');$('#zoom-btn').text('Zoom: 100%');isZoomed = false;}// Run entire system architecture setup sequenceprocessMagazineParts();
